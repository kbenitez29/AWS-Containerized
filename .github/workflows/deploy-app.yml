name: Deploy app to ECS

on:
    push:
        paths:
            - "app/**"
            - "Dockerfile"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check the repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to ECR
        run: |
            aws ecr get-login-password --region eu-west-1 | docker login \
            --username AWS \
            --password-stdin ${{ vars.ECR_REPOSITORY_URI }}

      - name: Build Docker image
        run: docker build -t my-app .

      - name: Tag image
        run: |
            docker tag my-app:latest ${{ vars.ECR_REPOSITORY_URI }}:latest
      
      - name: Push image
        run: |
            docker push ${{ vars.ECR_REPOSITORY_URI }}:latest   
        
      - name: Force ECS deployment
        run: |
            aws ecs update-service \
            --cluster main-cluster \
            --service app-service \
            --force-new-deployment
         